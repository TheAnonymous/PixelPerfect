name: Publish stable release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Match tag to package version
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync, readFileSync } from 'node:fs';
          const { version } = JSON.parse(readFileSync('package.json', 'utf8'));
          const expectedTag = `v${version}`;
          if (process.env.GITHUB_REF_NAME !== expectedTag) {
            throw new Error(`Tag ${process.env.GITHUB_REF_NAME} does not match package version ${version}.`);
          }
          appendFileSync(process.env.GITHUB_ENV, `ARCHIVE_NAME=pixelperfect-${expectedTag}.tar.gz\n`);
          NODE
      - name: Rebuild and verify release
        run: npm run check
      - name: Test showcase in every browser and viewport
        run: npm run test:e2e
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --repo "${GITHUB_REPOSITORY}"
          --title "PixelPerfect ${GITHUB_REF_NAME}"
          --notes-file RELEASE_NOTES.md
          "dist/release/${ARCHIVE_NAME}"
          "dist/release/${ARCHIVE_NAME}.sha256"
